<section class="fee-container">


<div class="fee-card">


<h2>
Verify Student
</h2>


<p>
Enter your Admission Number to continue fee payment.
</p>



<input 
type="text"
id="admissionNo"
placeholder="Enter Admission Number">



<button onclick="checkFee()">

Next

</button>

<script>


const menuBtn=document.getElementById("menuBtn");

const sidebar=document.getElementById("sidebar");

const overlay=document.getElementById("overlay");



menuBtn.onclick=function(){

sidebar.classList.toggle("active");

overlay.classList.toggle("active");

}



overlay.onclick=function(){

sidebar.classList.remove("active");

overlay.classList.remove("active");

}


</script>

<script>

function checkFee(){

let admissionNo =
document.getElementById("admissionNo").value;


if(admissionNo===""){

alert("Please enter Admission Number");
return;

}


console.log("Sending Admission:", admissionNo);
fetch("http://192.168.29.152:3000/check_fee",{

method:"POST",

headers:{

"Content-Type":"application/json"

},


body:JSON.stringify({

admission_no:admissionNo

})


})


.then(res=>res.json())


.then(data=>{


console.log(data);


if(data.error){

alert(data.error);

return;

}


// save student details

sessionStorage.setItem(
"AdmissionNo",
data.student.AdmissionNo
);


sessionStorage.setItem(
"studentData",
JSON.stringify(data.student)
);


// next page

window.location.href="payment-details.html";


})


.catch(error=>{


console.log(error);

alert("Backend Server Not Connected");


});


}

</script>
