<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Details</title>


<script src="https://checkout.razorpay.com/v1/checkout.js"></script>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">



<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

background:#f5f7fb;

}



/* HEADER */

header{

height:70px;

background:#003366;

display:flex;

align-items:center;

padding:10px 15px;

color:white;

}



.logo{

display:flex;

align-items:center;

gap:10px;

}



.logo img{

width:45px;
height:45px;
border-radius:50%;

}


.logo h2{

font-size:17px;

}



/* PAGE BANNER */


.page-banner{

height:180px;

background:#003366;

color:white;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

}



.page-banner h1{

font-size:28px;

}


.page-banner p{

font-size:13px;

margin-top:10px;

}




/* MAIN */


.payment-container{

padding:20px;

}



.payment-card{

background:white;

padding:20px;

border-radius:15px;

margin-bottom:20px;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}




.payment-card h2{

background:#003366;

color:white;

padding:12px;

border-radius:8px;

text-align:center;

font-size:20px;

margin-bottom:20px;

}




.student-photo{

text-align:center;

}


.student-photo img{

width:100px;

height:100px;

border-radius:50%;

}




.student-info p{

margin:12px 0;

font-size:15px;

}



.verified{

color:green;

font-weight:600;

}




label{

display:block;

margin-top:12px;

font-weight:600;

}



input,
select,
textarea{


width:100%;

padding:13px;

margin-top:8px;

border:1px solid #ccc;

border-radius:8px;

font-size:15px;


}




.payment-buttons{

display:flex;

gap:10px;

margin-top:20px;

}




button{

padding:13px;

border:none;

border-radius:8px;

font-size:15px;

font-weight:600;

cursor:pointer;

}



.secondary-btn{

background:#777;

color:white;

width:40%;

}




.primary-btn{

background:#003366;

color:white;

width:60%;

}




</style>


</head>



<body>



<header>


<div class="logo">


<img src="images/UPS Logo.jpg">


<h2>
UJJAVAL PUBLIC SCHOOL
</h2>


</div>


</header>





<section class="page-banner">


<h1>
Payment Details
</h1>


<p>
Please verify student information and complete payment
</p>


</section>





<section class="payment-container">



<div class="payment-card">


<h2>
Student Information
</h2>



<div class="student-photo">

<img src="images/default-student.png">

</div>



<div class="student-info">


<p>
<b>Admission No :</b>

<span id="admNo">
Loading...
</span>

</p>




<p>
<b>Student Name :</b>

<span id="studentName">
Loading...
</span>

</p>




<p>
<b>Father Name :</b>

<span id="fatherName">
Loading...
</span>

</p>




<p>
<b>Class :</b>

<span id="studentClass">
Loading...
</span>

</p>



<p>

<b>Status :</b>

<span class="verified">

✔ Verified

</span>


</p>



</div>


</div>






<div class="payment-card">


<h2>
Fee Payment Details
</h2>



<label>
Fee Type
</label>


<select id="feeType">

<option value="">
Select Fee Type
</option>

<option>
Admission Fee
</option>

<option>
Tuition Fee
</option>

<option>
Transport Fee
</option>

<option>
Examination Fee
</option>

<option>
Library Fee
</option>

<option>
Computer Fee
</option>

</select>




<label>
Payment Month
</label>


<select id="paymentMonth">


<option value="">
Select Month
</option>


<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
<option>January</option>
<option>February</option>
<option>March</option>


</select>




<label>
Payment Date
</label>


<input type="date" id="paymentDate">





<label>
Fee Amount ₹
</label>


<input 
type="number"
id="amount"
placeholder="Enter Amount">





<label>
Remarks
</label>


<textarea 
id="remarks"
rows="4"
placeholder="Enter Remarks">
</textarea>




<div class="payment-buttons">


<button class="secondary-btn"
onclick="history.back()">

← Back

</button>




<button class="primary-btn"
onclick="proceedPayment()">

Proceed Payment →

</button>



</div>



</div>



</section>






<script>


const API="http://192.168.29.152:3000";





// LOAD STUDENT


window.onload=function(){


document.getElementById("paymentDate").value =
new Date().toISOString().split("T")[0];



let admissionNo=sessionStorage.getItem("AdmissionNo");



if(!admissionNo){

alert("Student Details Not Found");

return;

}



fetch(API+"/check_fee",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

admission_no:admissionNo

})


})


.then(res=>res.json())


.then(data=>{


if(data.error){

alert(data.error);

return;

}



let student=data.student;



document.getElementById("admNo").innerText =
student.AdmissionNo;


document.getElementById("studentName").innerText =
student.StudentName;


document.getElementById("fatherName").innerText =
student.FatherName;


document.getElementById("studentClass").innerText =
student.Class;



})


.catch(err=>{


console.log(err);

alert("Backend Connection Failed");


});



}








// START PAYMENT


function proceedPayment(){



let feeType=document.getElementById("feeType").value;

let month=document.getElementById("paymentMonth").value;

let amount=document.getElementById("amount").value;



if(feeType===""){

alert("Select Fee Type");

return;

}



if(month===""){

alert("Select Payment Month");

return;

}



if(amount==="" || amount<=0){

alert("Enter Valid Amount");

return;

}



createOrder(amount);



}







function createOrder(amount){



fetch(API+"/create-order",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({

amount:amount

})


})


.then(res=>res.json())


.then(data=>{


if(!data.success){

alert(data.message);

return;

}



let options={



key:data.key,


amount:data.order.amount,


currency:"INR",


name:"UJJAVAL PUBLIC SCHOOL",


description:"School Fee Payment",


order_id:data.order.id,



handler:function(response){


savePayment(response);


},




prefill:{


name:
document.getElementById("studentName").innerText


},




theme:{


color:"#003366"

}



};



let razorpay=new Razorpay(options);


razorpay.open();



})

.catch(err=>{


console.log(err);

alert("Payment Gateway Error");


});


}









function savePayment(response){



fetch(API+"/save-online-payment",{


method:"POST",


headers:{


"Content-Type":"application/json"

},


body:JSON.stringify({



admissionNo:
document.getElementById("admNo").innerText,


studentName:
document.getElementById("studentName").innerText,


fatherName:
document.getElementById("fatherName").innerText,


className:
document.getElementById("studentClass").innerText,


feeType:
document.getElementById("feeType").value,


paymentMonth:
document.getElementById("paymentMonth").value,


amount:
document.getElementById("amount").value,


paymentMode:"Online",


razorpayOrderID:
response.razorpay_order_id,


razorpayPaymentID:
response.razorpay_payment_id,


status:"Success"



})


})


.then(res=>res.json())


.then(data=>{


if(data.success){


alert(
"Payment Successful\nReceipt No : "+data.receiptNo
);


// Save data for receipt page

sessionStorage.setItem(
"receiptNo",
data.receiptNo
);


sessionStorage.setItem(
"AdmissionNo",
document.getElementById("admNo").innerText
);


sessionStorage.setItem(
"studentName",
document.getElementById("studentName").innerText
);


sessionStorage.setItem(
"fatherName",
document.getElementById("fatherName").innerText
);


sessionStorage.setItem(
"className",
document.getElementById("studentClass").innerText
);


sessionStorage.setItem(
"feeType",
document.getElementById("feeType").value
);


sessionStorage.setItem(
"paymentMonth",
document.getElementById("paymentMonth").value
);


sessionStorage.setItem(
"amount",
document.getElementById("amount").value
);


sessionStorage.setItem(
"paymentDate",
document.getElementById("paymentDate").value
);


sessionStorage.setItem(
"paymentID",
response.razorpay_payment_id
);


sessionStorage.setItem(
"orderID",
response.razorpay_order_id
);



// Open receipt page

window.location.href =
"receipt-format.html?receiptNo="+data.receiptNo;


}


else{


alert("Payment Save Failed");


}



});


}



</script>


</body>

</html>
