</head>

<body>


<header>

<div class="logo">
    <img src="images/UPS Logo.jpg" alt="Ujjaval Public School Logo">
    <h2>UJJAVAL PUBLIC SCHOOL</h2>
</div>


<nav>

<ul>

<li><a href="index.html">Home</a></li>

<li><a href="about.html">About School</a></li>

</header>


<section class="announcement">

<div class="ticker">

📢 Admissions Open for Session 2026–27 , Annual Function is Scheduled on December 2026 , PTM is Held on 2nd Saturday

</div>

</section>



<section class="page-banner">

<h1>Notice Corner</h1>

</section>

<section class="notice-area">

<div class="notice-content">

<h2>Latest School Notices</h2>

<div id="noticeContainer">

</div>

</div>

</section>

<script>

loadNotices();

function loadNotices(){

fetch("http://localhost:3000/notices")

.then(response => response.json())

.then(data => {

if(data.success){

let notices = "";

data.data.forEach(notice => {

let formattedDate = new Date(notice.NoticeDate).toLocaleDateString("en-IN");

notices += `

<div class="notice-card">

<h3>📢 ${notice.Title}</h3>

<p>${notice.Description}</p>

<span>${formattedDate}</span>

</div>

`;

});

document.getElementById("noticeContainer").innerHTML = notices;

}else{

document.getElementById("noticeContainer").innerHTML = "<p>No notices available.</p>";

}

})

.catch(error => {

console.log(error);

document.getElementById("noticeContainer").innerHTML = "<p>Unable to load notices.</p>";

});

}

</script>

</body>

</html>
